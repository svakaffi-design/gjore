<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GJØRE</title>

<link rel="icon" type="image/png" href="icon.png">
<link rel="apple-touch-icon" href="icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: #000;
  color: #fff;
  font-family: 'Courier New', monospace;
  font-size: 14px;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding-top: 80px;
}

h1 {
  font-size: 14px;
  font-weight: bold;
  letter-spacing: 0.1em;
  margin-bottom: 28px;
}

#editor {
  width: 500px;
  max-width: 90vw;
}

.bullet-line {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 6px;
}

.bullet {
  user-select: none;
}

.bullet-input {
  background: transparent;
  border: none;
  outline: none;
  color: #fff;
  font-family: 'Courier New', monospace;
  font-size: 14px;
  width: 100%;
  caret-color: #fff;
}
</style>
</head>

<body>
<h1>GJØRE</h1>
<div id="editor"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { 
  getFirestore, 
  collection, 
  addDoc, 
  deleteDoc,
  doc,
  onSnapshot, 
  query, 
  orderBy,
  serverTimestamp 
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAClp1TFph3mI0KpUTc4bKInjTWLVxfQus",
  authDomain: "gjore-e16c6.firebaseapp.com",
  projectId: "gjore-e16c6",
  storageBucket: "gjore-e16c6.firebasestorage.app",
  messagingSenderId: "340297877908",
  appId: "1:340297877908:web:630d807c0261d677986781"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const bulletsRef = collection(db, "bullets");
const bulletsQuery = query(bulletsRef, orderBy("created"));

const editor = document.getElementById("editor");

function createLine(text = "", id = null) {
  const line = document.createElement("div");
  line.className = "bullet-line";

  const bullet = document.createElement("span");
  bullet.className = "bullet";
  bullet.textContent = "•";

  const input = document.createElement("input");
  input.type = "text";
  input.className = "bullet-input";
  input.value = text;

  input.addEventListener("keydown", async (e) => {

    // ➕ Legg til
    if (e.key === "Enter") {
      e.preventDefault();
      if (input.value.trim() !== "") {
        await addDoc(bulletsRef, {
          text: input.value,
          created: serverTimestamp()
        });
      }
    }

    // 🗑️ Slett
    if (e.key === "Backspace" && input.value === "" && id) {
      e.preventDefault();
      await deleteDoc(doc(db, "bullets", id));
    }
  });

  line.appendChild(bullet);
  line.appendChild(input);
  editor.appendChild(line);
}

// 🔄 Live sync
onSnapshot(bulletsQuery, (snapshot) => {
  editor.innerHTML = "";
  snapshot.forEach(docSnap => {
    createLine(docSnap.data().text, docSnap.id);
  });
  createLine(); // tom linje nederst
});
</script>

</body>
</html>
