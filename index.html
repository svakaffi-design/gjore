<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GJØRE</title>

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: #000;
  color: #fff;
  font-family: 'Courier New', monospace;
  font-size: 14px;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding-top: 80px;
}

h1 {
  font-size: 14px;
  letter-spacing: 0.1em;
  margin-bottom: 28px;
}

#editor {
  width: 500px;
  max-width: 90vw;
}

.line {
  display: flex;
  gap: 8px;
  margin-bottom: 6px;
}

input {
  background: transparent;
  border: none;
  outline: none;
  color: #fff;
  font-family: inherit;
  font-size: inherit;
  width: 100%;
}
</style>
</head>

<body>
<h1>GJØRE</h1>
<div id="editor"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {
  getFirestore,
  collection,
  addDoc,
  deleteDoc,
  updateDoc,
  doc,
  onSnapshot,
  query,
  orderBy,
  serverTimestamp
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAClp1TFph3mI0KpUTc4bKInjTWLVxfQus",
  authDomain: "gjore-e16c6.firebaseapp.com",
  projectId: "gjore-e16c6",
  storageBucket: "gjore-e16c6.firebasestorage.app",
  messagingSenderId: "340297877908",
  appId: "1:340297877908:web:630d807c0261d677986781"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const bulletsRef = collection(db, "bullets");
const bulletsQuery = query(bulletsRef, orderBy("created"));

const editor = document.getElementById("editor");

function render(snapshot) {
  editor.innerHTML = "";

  snapshot.forEach(docSnap => {
    const data = docSnap.data();
    const id = docSnap.id;

    const line = document.createElement("div");
    line.className = "line";

    const bullet = document.createElement("span");
    bullet.textContent = "•";

    const input = document.createElement("input");
    input.value = data.text;

    input.addEventListener("keydown", async (e) => {

      // ENTER → nytt dokument
      if (e.key === "Enter") {
        e.preventDefault();
        await addDoc(bulletsRef, {
          text: "",
          created: serverTimestamp()
        });
      }

      // BACKSPACE på tom linje → slett dokument
      if (e.key === "Backspace" && input.value === "") {
        e.preventDefault();
        await deleteDoc(doc(db, "bullets", id));
      }
    });

    // Oppdater tekst fortløpende
    input.addEventListener("input", async () => {
      await updateDoc(doc(db, "bullets", id), {
        text: input.value
      });
    });

    line.appendChild(bullet);
    line.appendChild(input);
    editor.appendChild(line);
  });
}

// Live sync
onSnapshot(bulletsQuery, (snapshot) => {
  render(snapshot);
});
</script>

</body>
</html>
